<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  
  <!-- Login Card -->
  <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-xl p-8 md:p-10">
    
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-3xl rounded-2xl mb-4">
        📖
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900">Welcome Back</h1>
      <p class="text-slate-500 mt-2">Login to your FawryBook account</p>
    </div>


    @if (errorMessage) {
      <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-lg flex items-center gap-3">
        <span class="text-xl">⚠️</span>
        <p class="text-sm font-semibold">{{ errorMessage }}</p>
      </div>
    }

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <!-- Email Input -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email Address</label>
        <div class="relative">
          <input
            type="email"
            formControlName="email"
            placeholder="name@company.com"
            class="w-full pl-4 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-slate-400 bg-slate-50 focus:bg-white text-slate-900"
          />
        </div>
      </div>

      <!-- Password Input -->
      <div>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-slate-400 bg-slate-50 focus:bg-white text-slate-900"
        />
      </div>

      <!-- Submit Button -->
      <button 
        type="submit"
        class="w-full py-4 bg-blue-600 text-white font-extrabold rounded-xl shadow-lg shadow-blue-100 hover:bg-blue-700 hover:-translate-y-0.5 transition-all active:scale-[0.98] cursor-pointer"
      >
        Login to Account
      </button>

      <!-- Footer Link -->
      <p class="text-center text-sm text-slate-500 pt-2">
        Don't have an account? 
        <a routerLink="/register" class="font-bold text-blue-600 hover:text-blue-700 transition-colors cursor-pointer">
          Register here
        </a>
      </p>

    </form>
  </div>
</div>

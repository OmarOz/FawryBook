<div class="min-h-[90vh] flex items-center justify-center px-4 py-12">
  
  <!-- Register Card -->
  <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-xl p-8 md:p-10">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-slate-900">Join FawryBook</h1>
      <p class="text-slate-500 mt-2">Start sharing your stories with the world.</p>
    </div>

    <!-- Error Message Alert (Server Side) -->
    @if (errorMessage) {
      <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-lg flex items-center gap-3 animate-in fade-in slide-in-from-top-2 duration-300">
        <span class="text-xl">⚠️</span>
        <p class="text-sm font-semibold">{{ errorMessage }}</p>
      </div>
    }

    <!-- Form -->
    <form [formGroup]="registerationForm" (ngSubmit)="onSubmit()" class="space-y-5">
      
      <!-- Email Input -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email Address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-slate-50 focus:bg-white text-slate-900 placeholder:text-slate-400"
        />
      </div>

      <!-- Username Input -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
        <input
          type="text"
          formControlName="username"
          placeholder="Choose a unique handle"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-slate-50 focus:bg-white text-slate-900 placeholder:text-slate-400"
        />
      </div>

      <!-- Password Input -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Min. 8 characters"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-slate-50 focus:bg-white text-slate-900 placeholder:text-slate-400"
        />
      </div>

      <!-- Submit Button -->
      <div class="pt-2">
        <button 
          type="submit"
          class="w-full py-4 bg-blue-600 text-white font-extrabold rounded-xl shadow-lg shadow-blue-100 hover:bg-blue-700 hover:-translate-y-0.5 transition-all active:scale-[0.98] cursor-pointer"
        >
          Create Account
        </button>
      </div>

      <!-- Footer Link -->
      <p class="text-center text-sm text-slate-500 pt-2">
        Already have an account? 
        <a routerLink="/login" class="font-bold text-blue-600 hover:text-blue-700 transition-colors">
          Login here
        </a>
      </p>

    </form>
  </div>
</div>
